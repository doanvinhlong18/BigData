version: "3.8"

# ================================================================
# docker-compose.master.yml — MASTER MACHINE
# Chạy: Spark Master, Postgres, Airflow, MLflow, Prometheus,
#        Grafana, Predict Service, 3× Producers, monitoring tools
#
# KHÔNG chạy: Kafka, Zookeeper, MinIO, Spark Worker
# (tất cả đã chuyển sang docker-compose.worker.yml)
# ================================================================

x-minio-env: &minio-env
  AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY}
  AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY}
  MLFLOW_S3_ENDPOINT_URL: ${MINIO_ENDPOINT_EXTERNAL}

x-spark-base: &spark-base
  image: bigdata-spark:latest
  build:
    context: ./spark
    dockerfile: Dockerfile

services:

  # ── SPARK MASTER ───────────────────────────────────────────────
  spark-master:
    <<: *spark-base
    container_name: spark-master
    restart: unless-stopped
    command: spark-class org.apache.spark.deploy.master.Master
    mem_limit: 2g
    cpus: 1.0
    environment:
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: 7077
      SPARK_MASTER_WEBUI_PORT: 8080
      SPARK_DAEMON_MEMORY: 1g
      SPARK_LOCAL_IP: "0.0.0.0"
      MASTER_IP: ${MASTER_IP}
      # MinIO ở Worker machine — dùng external URL
      MINIO_ENDPOINT: ${MINIO_ENDPOINT_EXTERNAL}
      AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY}
      PYSPARK_PYTHON: /usr/bin/python3
      PYSPARK_DRIVER_PYTHON: /usr/bin/python3
      # Driver dùng Kafka qua LAN (Kafka ở Worker machine)
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_EXTERNAL}
      KAFKA_BOOTSTRAP_SERVERS_EXECUTOR: ${KAFKA_BOOTSTRAP_EXTERNAL}
      STREAMING_CHECKPOINT_BASE: ${STREAMING_CHECKPOINT_BASE:-s3a://checkpoints}
      STATEFUL_CHECKPOINT_BASE: ${STATEFUL_CHECKPOINT_BASE:-s3a://checkpoints}
      STATEFUL_STREAM_MASTER: ${STATEFUL_STREAM_MASTER:-spark://spark-master:7077}
      SPARK_TRIGGER_INTERVAL_S: ${SPARK_TRIGGER_INTERVAL_S:-30}
      SOURCE_WAIT_POLL_S: ${SOURCE_WAIT_POLL_S:-30}
      LAUNCHER_POLL_INTERVAL_S: ${LAUNCHER_POLL_INTERVAL_S:-30}
      KAFKA_MAX_OFFSETS_PER_TRIGGER: ${KAFKA_MAX_OFFSETS_PER_TRIGGER:-5000}
      GOLD_TRIGGER_INTERVAL_S: ${GOLD_TRIGGER_INTERVAL_S:-60}
      GOLD_MAX_FILES_PER_TRIGGER: ${GOLD_MAX_FILES_PER_TRIGGER:-10}
      GOLD_WINDOW_DURATION: ${GOLD_WINDOW_DURATION:-30 minutes}
      GOLD_SLIDE_DURATION: ${GOLD_SLIDE_DURATION:-15 minutes}
      GOLD_WINDOW_LOOKBACK_MINUTES: ${GOLD_WINDOW_LOOKBACK_MINUTES:-30}
      JOB1_EXECUTOR_CORES: ${JOB1_EXECUTOR_CORES:-2}
      JOB1_TOTAL_CORES: ${JOB1_TOTAL_CORES:-2}
      JOB1_EXECUTOR_MEMORY: ${JOB1_EXECUTOR_MEMORY:-1280m}
      JOB1_MEMORY_OVERHEAD: ${JOB1_MEMORY_OVERHEAD:-256m}
      JOB1_DRIVER_MEMORY: ${JOB1_DRIVER_MEMORY:-256m}
      JOB1_SHUFFLE_PARTITIONS: ${JOB1_SHUFFLE_PARTITIONS:-4}
      JOB2_EXECUTOR_CORES: ${JOB2_EXECUTOR_CORES:-1}
      JOB2_TOTAL_CORES: ${JOB2_TOTAL_CORES:-1}
      JOB2_EXECUTOR_MEMORY: ${JOB2_EXECUTOR_MEMORY:-640m}
      JOB2_MEMORY_OVERHEAD: ${JOB2_MEMORY_OVERHEAD:-256m}
      JOB2_DRIVER_MEMORY: ${JOB2_DRIVER_MEMORY:-256m}
      JOB2_SHUFFLE_PARTITIONS: ${JOB2_SHUFFLE_PARTITIONS:-4}
      JOB3_EXECUTOR_CORES: ${JOB3_EXECUTOR_CORES:-1}
      JOB3_TOTAL_CORES: ${JOB3_TOTAL_CORES:-1}
      JOB3_EXECUTOR_MEMORY: ${JOB3_EXECUTOR_MEMORY:-1024m}
      JOB3_MEMORY_OVERHEAD: ${JOB3_MEMORY_OVERHEAD:-256m}
      JOB3_DRIVER_MEMORY: ${JOB3_DRIVER_MEMORY:-256m}
      JOB3_SHUFFLE_PARTITIONS: ${JOB3_SHUFFLE_PARTITIONS:-4}
      JOB4_EXECUTOR_CORES: ${JOB4_EXECUTOR_CORES:-2}
      JOB4_TOTAL_CORES: ${JOB4_TOTAL_CORES:-2}
      JOB4_EXECUTOR_MEMORY: ${JOB4_EXECUTOR_MEMORY:-2816m}
      JOB4_MEMORY_OVERHEAD: ${JOB4_MEMORY_OVERHEAD:-256m}
      JOB4_DRIVER_MEMORY: ${JOB4_DRIVER_MEMORY:-256m}
      JOB4_SHUFFLE_PARTITIONS: ${JOB4_SHUFFLE_PARTITIONS:-4}
      JOB5_EXECUTOR_CORES: ${JOB5_EXECUTOR_CORES:-2}
      JOB5_TOTAL_CORES: ${JOB5_TOTAL_CORES:-2}
      JOB5_EXECUTOR_MEMORY: ${JOB5_EXECUTOR_MEMORY:-3584m}
      JOB5_MEMORY_OVERHEAD: ${JOB5_MEMORY_OVERHEAD:-384m}
      JOB5_DRIVER_MEMORY: ${JOB5_DRIVER_MEMORY:-512m}
      JOB5_SHUFFLE_PARTITIONS: ${JOB5_SHUFFLE_PARTITIONS:-4}
    extra_hosts:
      # Worker machine hosts — Spark Master cần resolve để cấp executor
      - "${SPARK_WORKER_A_HOST:-spark-worker-A}:${SPARK_WORKER_A_IP}"
      - "${SPARK_WORKER_B_HOST:-spark-worker-B}:${SPARK_WORKER_B_IP:-127.0.0.1}"
      - "${SPARK_WORKER_C_HOST:-spark-worker-C}:${SPARK_WORKER_C_IP:-127.0.0.1}"
      # Kafka và MinIO ở Worker machine
      - "kafka:${WORKER_IP}"
      - "minio:${WORKER_IP}"
      - "zookeeper:${WORKER_IP}"
    ports:
      - "7077:7077"
      - "8080:8080"
      - "4040-4050:4040-4050"
      - "4100-4120:4100-4120"
      - "7337-7360:7337-7360"
    volumes:
      - ./spark/jobs:/opt/spark/app/spark/jobs
      - ./scripts:/opt/spark/app/scripts
      - ./monitoring/spark-metrics/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ${DATASET_PATH}:/datasets:ro
      - spark-checkpoints:/opt/spark/checkpoints
    healthcheck:
      test: curl -f http://localhost:8080
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── POSTGRES ───────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.0
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    command: >
      postgres
        -c shared_buffers=256MB
        -c work_mem=16MB
        -c max_connections=200
        -c checkpoint_completion_target=0.9
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── AIRFLOW ────────────────────────────────────────────────────
  airflow:
    mem_limit: 2g
    cpus: 1.5
    build:
      context: ./airflow
      dockerfile: Dockerfile
    image: bigdata-airflow:latest
    container_name: airflow
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__METRICS__STATSD_ON: "true"
      AIRFLOW__METRICS__STATSD_HOST: airflow-statsd-exporter
      AIRFLOW__METRICS__STATSD_PORT: 8125
      AIRFLOW__METRICS__STATSD_PREFIX: airflow
      MASTER_IP: ${MASTER_IP}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT_EXTERNAL}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI_INTERNAL}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      WEATHER_PARQUET_LOCAL: /opt/airflow/datasets/parquet_by_day
      WEATHER_CSV_PATH: ${WEATHER_CSV_PATH}
      SPARK_MASTER_URL: ${SPARK_MASTER_URL}
      SILVER_RESPONSE: s3a://silver/response
      SILVER_COMPLETE: s3a://silver/complete
      GOLD_AGGREGATED: s3a://gold/aggregated
      <<: *minio-env
    extra_hosts:
      - "minio:${WORKER_IP}"
      - "kafka:${WORKER_IP}"
    ports:
      - "8888:8080"
    volumes:
      - airflow-data:/opt/airflow
      - ./airflow/dags:/opt/airflow/dags
      - ./ml:/opt/airflow/ml
      - ./datasets/parquet_by_day:/opt/airflow/datasets/parquet_by_day:ro
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create --username admin --password admin
          --firstname Admin --lastname Admin
          --role Admin --email admin@bigdata.com 2>/dev/null || true &&
        airflow webserver &
        airflow scheduler
      "
    healthcheck:
      test: curl -f http://localhost:8080/health
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s

  airflow-statsd-exporter:
    image: prom/statsd-exporter:v0.26.0
    container_name: airflow-statsd-exporter
    restart: unless-stopped
    command:
      - "--statsd.listen-udp=:8125"
      - "--web.listen-address=:9102"
      - "--statsd.mapping-config=/etc/statsd/statsd_mapping.yml"
    ports:
      - "9102:9102"
    volumes:
      - ./monitoring/airflow-statsd/statsd_mapping.yml:/etc/statsd/statsd_mapping.yml:ro

  # ── PREDICT SERVICE ────────────────────────────────────────────
  predict-service:
    build:
      context: ./predict_service
      dockerfile: Dockerfile
    image: bigdata-predict-service:latest
    container_name: predict-service
    restart: unless-stopped
    mem_limit: 512m
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MINIO_ENDPOINT: ${MINIO_ENDPOINT_EXTERNAL}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI_INTERNAL}
      GOLD_AGG_PATH: s3://gold/aggregated
      WEATHER_PARQUET_LOCAL: /datasets/parquet_by_day
      WEATHER_CSV_PATH: ${WEATHER_CSV_PATH}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POLL_INTERVAL_S: ${PREDICT_POLL_INTERVAL_S:-1800}
      EMPTY_RETRY_INTERVAL_S: ${PREDICT_EMPTY_RETRY_INTERVAL_S:-60}
      MODEL_RELOAD_INTERVAL_S: ${MODEL_RELOAD_INTERVAL_S:-1800}
      <<: *minio-env
    extra_hosts:
      - "minio:${WORKER_IP}"
      - "mlflow:${MASTER_IP}"
    volumes:
      - ./ml:/opt/ml:ro
      - ${DATASET_PATH}:/datasets:ro

  # ── MLFLOW ─────────────────────────────────────────────────────
  mlflow:
    build:
      context: ./ml
      dockerfile: Dockerfile
    container_name: mlflow
    restart: unless-stopped
    mem_limit: 512m
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *minio-env
    command: >
      mlflow server
      --backend-store-uri postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/mlflow
      --default-artifact-root s3://mlflow-artifacts/
      --host 0.0.0.0
      --port 5000
      --allowed-hosts *
    extra_hosts:
      - "minio:${WORKER_IP}"
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ── PROMETHEUS ─────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: prometheus
    restart: unless-stopped
    mem_limit: 1g
    cpus: 0.5
    entrypoint:
      - /bin/sh
      - -c
    command:
      - |
        sed \
          -e s#__WORKER_IP__#${WORKER_IP}#g \
          -e s#__MASTER_IP__#${MASTER_IP}#g \
          -e s#__SPARK_WORKER_A_HOST__#${SPARK_WORKER_A_HOST}#g \
          /etc/prometheus/prometheus.yml.template > /tmp/prometheus.yml
        exec /bin/prometheus \
          --config.file=/tmp/prometheus.yml \
          --storage.tsdb.path=/prometheus \
          --storage.tsdb.retention.time=30d \
          --web.enable-lifecycle \
          --web.enable-admin-api
    environment:
      WORKER_IP: ${WORKER_IP}
      MASTER_IP: ${MASTER_IP}
      SPARK_WORKER_A_HOST: ${SPARK_WORKER_A_HOST:-spark-worker-A}
    extra_hosts:
      - "${SPARK_WORKER_A_HOST:-spark-worker-A}:${WORKER_IP}"
      - "kafka:${WORKER_IP}"
      - "minio:${WORKER_IP}"
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml.template:ro
      - ./monitoring/prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus-data:/prometheus

  # ── GRAFANA ────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.25
    depends_on:
      postgres:
        condition: service_healthy
      prometheus:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: grafana-piechart-panel
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/infrastructure.json
      GF_UNIFIED_ALERTING_ENABLED: "true"
      GF_SECURITY_CONTENT_SECURITY_POLICY: "false"
      GF_POSTGRES_USER: ${POSTGRES_USER}
      GF_POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro

  # ── PRODUCERS — chạy trên Master, đẩy data sang Kafka ở Worker ─
  request-producer:
    mem_limit: 512m
    cpus: 0.25
    build:
      context: ./producer
      dockerfile: Dockerfile
    container_name: request-producer
    restart: unless-stopped
    command: python -u unified_producer.py request
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_EXTERNAL}
      SPEED_FACTOR: ${SPEED_FACTOR}
      DATASET_PATH: /datasets
      PYTHONUNBUFFERED: "1"
    extra_hosts:
      - "kafka:${WORKER_IP}"
    volumes:
      - ${DATASET_PATH}:/datasets:ro

  pickup-producer:
    mem_limit: 512m
    cpus: 0.25
    build:
      context: ./producer
      dockerfile: Dockerfile
    container_name: pickup-producer
    restart: unless-stopped
    command: python -u unified_producer.py pickup
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_EXTERNAL}
      SPEED_FACTOR: ${SPEED_FACTOR}
      DATASET_PATH: /datasets
      PYTHONUNBUFFERED: "1"
    extra_hosts:
      - "kafka:${WORKER_IP}"
    volumes:
      - ${DATASET_PATH}:/datasets:ro

  dropoff-producer:
    mem_limit: 512m
    cpus: 0.25
    build:
      context: ./producer
      dockerfile: Dockerfile
    container_name: dropoff-producer
    restart: unless-stopped
    command: python -u unified_producer.py dropoff
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_EXTERNAL}
      SPEED_FACTOR: ${SPEED_FACTOR}
      DATASET_PATH: /datasets
      PYTHONUNBUFFERED: "1"
    extra_hosts:
      - "kafka:${WORKER_IP}"
    volumes:
      - ${DATASET_PATH}:/datasets:ro

  # ── MONITORING ─────────────────────────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    ports:
      - "8091:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    command:
      - "--port=8080"
      - "--housekeeping_interval=15s"
      - "--docker_only=true"

  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /:/host:ro

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.24.0
    container_name: blackbox-exporter
    restart: unless-stopped
    ports:
      - "9115:9115"
    command:
      - "--config.file=/etc/blackbox/config.yml"
    volumes:
      - ./monitoring/prometheus/blackbox.yml:/etc/blackbox/config.yml:ro

volumes:
  postgres-data:
  airflow-data:
  grafana-data:
  prometheus-data:
  spark-checkpoints:

networks:
  default:
    name: bigdata-master-net
    driver: bridge