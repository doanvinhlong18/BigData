# spark-defaults.conf
# ── THÊM so với phiên bản cũ: Prometheus metrics sink ──────────────────

spark.master                     spark://spark-master:7077
spark.app.name                   NYC-Taxi-Pipeline

# ── Delta Lake extensions ────────────────────────────────────
spark.sql.extensions             io.delta.sql.DeltaSparkSessionExtension
spark.sql.catalog.spark_catalog  org.apache.spark.sql.delta.catalog.DeltaCatalog

# ── S3A / MinIO ──────────────────────────────────────────────
spark.hadoop.fs.s3a.endpoint              http://minio:9000
spark.hadoop.fs.s3a.access.key            minioadmin
spark.hadoop.fs.s3a.secret.key            minioadmin
spark.hadoop.fs.s3a.path.style.access     true
spark.hadoop.fs.s3a.impl                  org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.connection.ssl.enabled false

# ── S3A performance ───────────────────────────────────────────
spark.hadoop.fs.s3a.fast.upload           true
spark.hadoop.fs.s3a.fast.upload.buffer    bytebuffer
spark.hadoop.fs.s3a.multipart.size        32m
spark.hadoop.fs.s3a.connection.maximum    100
spark.hadoop.fs.s3a.threads.max           20

# ── Distributed networking (2-machine setup) ─────────────────
# Driver binds to all interfaces so Docker Desktop can forward
# MASTER_IP:4040 / MASTER_IP:7337 to remote executors on the worker.
spark.driver.bindAddress                  0.0.0.0

# Fixed block-manager port — published in docker-compose on both machines.
# Remote executors reach driver's block manager at MASTER_IP:7337 via VPN.
spark.blockManager.port                   7337

# ── Streaming ─────────────────────────────────────────────────
spark.streaming.backpressure.enabled      true
spark.sql.streaming.checkpointFileManagerClass  org.apache.spark.sql.execution.streaming.CheckpointFileManager

# ── Shuffle ───────────────────────────────────────────────────
spark.sql.shuffle.partitions              8

# ═══════════════════════════════════════════════════════════════
# PROMETHEUS METRICS SINK (MỚI)
# ═══════════════════════════════════════════════════════════════
# Bật built-in Prometheus metrics sink của Spark
# Prometheus scrapes từ http://spark-master:8080/metrics/master/prometheus/
# và http://<executor-host>:4040/metrics/json/

# Bật metrics system
spark.metrics.conf.*.sink.prometheusServlet.class   org.apache.spark.metrics.sink.PrometheusServlet
spark.metrics.conf.*.sink.prometheusServlet.path    /metrics/prometheus

# Bật cho master
spark.metrics.conf.master.sink.prometheusServlet.class  org.apache.spark.metrics.sink.PrometheusServlet
spark.metrics.conf.master.sink.prometheusServlet.path   /metrics/master/prometheus/

# Bật cho worker
spark.metrics.conf.worker.sink.prometheusServlet.class  org.apache.spark.metrics.sink.PrometheusServlet
spark.metrics.conf.worker.sink.prometheusServlet.path   /metrics/worker/prometheus/

# Bật cho driver (app)
spark.metrics.conf.driver.sink.prometheusServlet.class  org.apache.spark.metrics.sink.PrometheusServlet
spark.metrics.conf.driver.sink.prometheusServlet.path   /metrics/driver/prometheus/

# Bật các nguồn metrics
spark.metrics.conf.*.source.jvm.class     org.apache.spark.metrics.source.JvmSource

# Streaming metrics (quan trọng cho monitoring lag)
spark.sql.streaming.metricsEnabled        true

# ── UI ports ─────────────────────────────────────────────────
# Cần expose các port này trong docker-compose
spark.ui.port                             4040
spark.master.ui.port                      8080
spark.worker.ui.port                      8081