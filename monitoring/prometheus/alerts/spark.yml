groups:
  - name: spark_alerts
    interval: 30s
    rules:
      - alert: SparkMasterDown
        expr: up{job="spark-master"} == 0
        for: 1m
        labels: { severity: critical, component: spark }
        annotations:
          summary: " Spark Master DOWN"
          description: "Spark Master không phản hồi."

      - alert: SparkNoActiveWorkers
        expr: metrics_master_aliveWorkers_Value < 1
        for: 2m
        labels: { severity: critical, component: spark }
        annotations:
          summary: " Spark không có Worker active ({{ $value }})"
          description: "Worker duy nhất mất kết nối. Pipeline ngừng."

      - alert: SparkInsufficientApps
        expr: metrics_master_apps_Value < 3
        for: 5m
        labels: { severity: critical, component: spark }
        annotations:
          summary: " Chỉ có {{ $value }} Spark app (cần ≥ 3)"
          description: "Các job Bronze/Silver/Gold đang bị thiếu. Chạy lại submit-jobs.sh"

      - alert: SparkStreamingBatchDurationHigh
        expr: '{__name__=~"metrics_app_.*_driver_spark_streaming_.*_latency_Value"} > 120000'
        for: 5m
        labels: { severity: warning, component: spark }
        annotations:
          summary: " Spark batch duration > 120s"
          description: "Backpressure hoặc executor đang spill. Kiểm tra Spark UI."

      - alert: SparkDriverHeapHigh
        expr: '{__name__=~"metrics_app_.*_driver_jvm_heap_usage_Value"} > 0.85'
        for: 5m
        labels: { severity: warning, component: spark }
        annotations:
          summary: " Spark Driver heap > 85%"
          description: "Nguy cơ OOM Driver."

      - alert: SparkDriverHeapCritical
        expr: '{__name__=~"metrics_app_.*_driver_jvm_heap_usage_Value"} > 0.95'
        for: 2m
        labels: { severity: critical, component: spark }
        annotations:
          summary: " Spark Driver heap > 95% — OOM imminent"
          description: "Restart job ngay hoặc tăng driver memory."
