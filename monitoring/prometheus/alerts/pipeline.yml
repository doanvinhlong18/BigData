groups:
  - name: pipeline_data_alerts
    interval: 60s
    rules:
      # NOTE: Các alert nyc_taxi_* (gold lag, confidence) đã bị bỏ vì
      # metrics-api không còn tồn tại (demo mode).
      # Pipeline health được theo dõi qua:
      #   - airflow.yml   → monitoring_dag, predict-service staleness
      #   - spark.yml     → worker/app count, streaming latency, stage failures
      #   - kafka.yml     → producer ingestion, partition offsets/log size
      #   - Grafana dashboard đọc trực tiếp từ PostgreSQL

      # ── predict-service không ghi prediction trong 45 phút ────
      # Duplicate của alert trong airflow.yml — giữ ở đây để
      # pipeline_data_alerts group cũng cover trường hợp này.
      - alert: PredictServiceStale
        expr: |
          (time() - predict_service_last_prediction_timestamp) > 2700
          or absent(predict_service_last_prediction_timestamp) == 1
        for: 10m
        labels:
          severity: critical
          component: predict_service
        annotations:
          summary: "🔴 predict-service không ghi prediction trong {{ $value | humanizeDuration }}"
          description: |
            predict-service (Python loop) ngừng hoạt động hoặc không có model Production.
            Kiểm tra: docker logs predict-service
            Nếu thiếu model: chạy upload_model_to_mlflow.py trên máy local.
