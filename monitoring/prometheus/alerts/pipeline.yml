groups:
  - name: pipeline_alerts
    interval: 60s
    rules:
      - alert: PredictServiceStale
        expr: |
          (time() - predict_service_last_prediction_timestamp) > 2700
          or absent(predict_service_last_prediction_timestamp) == 1
        for: 10m
        labels: { severity: critical, component: predict_service }
        annotations:
          summary: " predict-service không ghi prediction trong > 45 phút"
          description: "Kiểm tra: docker logs predict-service. Cần model Production trong MLflow."

      - alert: PredictServiceIncompleteSlot
        expr: predict_service_zones_predicted_last_slot < 250
        for: 5m
        labels: { severity: warning, component: predict_service }
        annotations:
          summary: " predict-service chỉ predict {{ $value }}/263 zones"
          description: "Một số zones thiếu feature hoặc lỗi batch."

      - alert: WorkerHighMemory
        expr: |
          container_memory_usage_bytes{container_label_com_docker_compose_service="spark-worker"}
          / container_spec_memory_limit_bytes{container_label_com_docker_compose_service="spark-worker"} > 0.90
        for: 5m
        labels: { severity: warning, component: spark }
        annotations:
          summary: " Spark Worker RAM > 90% limit"
          description: "Executor đang gần OOM. Kiểm tra spill trong Spark UI."
