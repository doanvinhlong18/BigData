groups:
  - name: kafka_alerts
    interval: 30s
    rules:

      # ── Broker down ──────────────────────────────────────────
      - alert: KafkaBrokerDown
        expr: up{job="kafka"} == 0
        for: 1m
        labels:
          severity: critical
          component: kafka
        annotations:
          summary: "🔴 Kafka broker DOWN"
          description: "Kafka broker không phản hồi trong 1 phút. Pipeline sẽ ngừng nhận data."

      # ── Zookeeper down ───────────────────────────────────────
      - alert: ZookeeperDown
        expr: up{job="zookeeper"} == 0
        for: 1m
        labels:
          severity: critical
          component: kafka
        annotations:
          summary: "🔴 Zookeeper DOWN"
          description: "Zookeeper down — Kafka sẽ không thể hoạt động."

      # Consumer lag cần kafka-lag-exporter, service này đang tắt trong demo mode.
      # Theo dõi ingestion bằng KafkaNoMessagesIngested và partition offset trên Grafana.

      # ── Under-replicated partitions ───────────────────────────
      - alert: KafkaUnderReplicatedPartitions
        expr: kafka_server_replicamanager_underreplicatedpartitions > 0
        for: 2m
        labels:
          severity: warning
          component: kafka
        annotations:
          summary: "⚠️ Kafka có {{ $value }} under-replicated partition"
          description: "Một số partition chưa được replicate đủ. Dữ liệu có thể bị mất nếu broker fail."

      # ── Disk Kafka full ───────────────────────────────────────
      - alert: KafkaLogDirUsageHigh
        expr: sum(kafka_log_log_size{topic="nyc_taxi_events"}) > 5e9
        for: 10m
        labels:
          severity: warning
          component: kafka
        annotations:
          summary: "⚠️ Kafka log size > 5GB cho topic nyc_taxi_events"
          description: "Log retention có thể không xóa kịp. Kiểm tra KAFKA_LOG_RETENTION_HOURS."

      # ── Producer không ghi vào Kafka ─────────────────────────
      - alert: KafkaNoMessagesIngested
        expr: |
          sum(kafka_server_brokertopicmetrics_messagesin_rate1m{topic="nyc_taxi_events"}) == 0
        for: 10m
        labels:
          severity: warning
          component: kafka
        annotations:
          summary: "⚠️ Không có message mới vào topic nyc_taxi_events trong 10 phút"
          description: "Producer có thể đã crash hoặc finish. Kiểm tra container request-producer và response-producer."
