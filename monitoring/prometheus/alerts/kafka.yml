groups:
  - name: kafka_alerts
    interval: 30s
    rules:
      - alert: KafkaBrokerDown
        expr: up{job="kafka"} == 0
        for: 1m
        labels: { severity: critical, component: kafka }
        annotations:
          summary: " Kafka broker DOWN"
          description: "Kafka không phản hồi — pipeline ngừng nhận data."

      - alert: KafkaOfflinePartitions
        expr: kafka_controller_offline_partitions_count > 0
        for: 1m
        labels: { severity: critical, component: kafka }
        annotations:
          summary: " {{ $value }} Kafka partition OFFLINE"
          description: "Partition offline — consumer không đọc được data."

      - alert: KafkaNoActiveController
        expr: kafka_controller_active_controller_count == 0
        for: 1m
        labels: { severity: critical, component: kafka }
        annotations:
          summary: " Không có Kafka controller active"
          description: "Cluster Kafka mất controller."

      - alert: KafkaUnderReplicatedPartitions
        expr: kafka_server_replicamanager_underreplicatedpartitions > 0
        for: 2m
        labels: { severity: warning, component: kafka }
        annotations:
          summary: " Kafka {{ $value }} under-replicated partition"
          description: "Partition chưa replicate đủ."

      - alert: KafkaNoMessagesIngested
        expr: sum(kafka_server_brokertopicmetrics_messagesin_rate1m{topic="nyc_taxi_events"}) == 0
        for: 10m
        labels: { severity: warning, component: kafka }
        annotations:
          summary: " Không có message mới vào Kafka trong 10 phút"
          description: "Producers có thể đã crash hoặc finish dataset."

      - alert: KafkaJVMHeapHigh
        expr: kafka_jvm_heap_used_bytes / kafka_jvm_heap_max_bytes > 0.85
        for: 5m
        labels: { severity: warning, component: kafka }
        annotations:
          summary: " Kafka JVM heap > 85%"
          description: "Nguy cơ OOM. Tăng KAFKA_HEAP_OPTS nếu cần."
