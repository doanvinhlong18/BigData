groups:
  - name: kafka_alerts
    interval: 30s
    rules:

      # ── Broker down ──────────────────────────────────────────
      - alert: KafkaBrokerDown
        expr: up{job="kafka"} == 0
        for: 1m
        labels:
          severity: critical
          component: kafka
        annotations:
          summary: "🔴 Kafka broker DOWN"
          description: "Kafka broker không phản hồi trong 1 phút. Pipeline sẽ ngừng nhận data."

      # ── Zookeeper down ───────────────────────────────────────
      - alert: ZookeeperDown
        expr: up{job="zookeeper"} == 0
        for: 1m
        labels:
          severity: critical
          component: kafka
        annotations:
          summary: "🔴 Zookeeper DOWN"
          description: "Zookeeper down — Kafka sẽ không thể hoạt động."

      # ── Consumer lag cao — Spark Streaming bị chậm ───────────
      - alert: KafkaConsumerLagHigh
        expr: kafka_consumer_group_lag{topic="nyc_taxi_events"} > 50000
        for: 5m
        labels:
          severity: warning
          component: kafka
        annotations:
          summary: "⚠️ Kafka consumer lag cao: {{ $value }} messages"
          description: |
            Consumer group {{ $labels.consumer_group }} lag {{ $value }} messages trên topic nyc_taxi_events.
            Spark Streaming đang xử lý chậm hơn producer. Kiểm tra Spark worker resources.

      - alert: KafkaConsumerLagCritical
        expr: kafka_consumer_group_lag{topic="nyc_taxi_events"} > 200000
        for: 3m
        labels:
          severity: critical
          component: kafka
        annotations:
          summary: "🔴 Kafka consumer lag CRITICAL: {{ $value }} messages"
          description: |
            Lag > 200k messages. Spark Streaming bị stuck hoặc crash.
            Cần restart Spark job hoặc scale thêm worker.

      # ── Under-replicated partitions ───────────────────────────
      - alert: KafkaUnderReplicatedPartitions
        expr: kafka_server_replicamanager_underreplicatedpartitions > 0
        for: 2m
        labels:
          severity: warning
          component: kafka
        annotations:
          summary: "⚠️ Kafka có {{ $value }} under-replicated partition"
          description: "Một số partition chưa được replicate đủ. Dữ liệu có thể bị mất nếu broker fail."

      # ── Disk Kafka full ───────────────────────────────────────
      - alert: KafkaLogDirUsageHigh
        expr: kafka_log_log_size{topic="nyc_taxi_events"} > 5e9
        for: 10m
        labels:
          severity: warning
          component: kafka
        annotations:
          summary: "⚠️ Kafka log size > 5GB cho topic nyc_taxi_events"
          description: "Log retention có thể không xóa kịp. Kiểm tra KAFKA_LOG_RETENTION_HOURS."

      # ── Producer không ghi vào Kafka ─────────────────────────
      - alert: KafkaNoMessagesIngested
        expr: |
          rate(kafka_server_brokertopicmetrics_messagesin_total{topic="nyc_taxi_events"}[5m]) == 0
        for: 10m
        labels:
          severity: warning
          component: kafka
        annotations:
          summary: "⚠️ Không có message mới vào topic nyc_taxi_events trong 10 phút"
          description: "Producer có thể đã crash hoặc finish. Kiểm tra container request-producer và response-producer."
