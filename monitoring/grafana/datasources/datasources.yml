apiVersion: 1

datasources:
  # Prometheus: infrastructure + airflow + kafka metrics
  - name: Prometheus
    uid: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: false
    jsonData:
      httpMethod: POST
      prometheusType: Prometheus
      prometheusVersion: 2.48.0
      cacheLevel: "Low"
    version: 1
    editable: true

  # PostgreSQL: predictions_monitoring — datasource chính cho ML panels
  # Grafana đọc thẳng SQL, không cần metrics-api làm trung gian
  - name: PostgreSQL
    uid: PostgreSQL
    type: postgres
    access: proxy
    url: postgres:5432
    database: bigdata
    user: ${GF_POSTGRES_USER}
    secureJsonData:
      password: ${GF_POSTGRES_PASSWORD}
    jsonData:
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 5
      connMaxLifetime: 14400
      postgresVersion: 1600
      timescaledb: false
    isDefault: true
    version: 1
    editable: true
