# ============================================================
#  NYC TAXI + WEATHER BIG DATA STREAMING PIPELINE
# ============================================================
# Kiến trúc: Spark Streaming đọc từ Kafka → MinIO (Bronze Layer)
# Tech Stack: Kafka, Spark Streaming, MinIO
#
# LUỒNG DỮ LIỆU:
#   Producer → Kafka → [Spark Streaming] → MinIO (bronze/)
#   MinIO (bronze/) → [Spark] → MinIO (silver/ → gold/)
#
# PORTS:
#   - 2181: Zookeeper
#   - 9092: Kafka
#   - 9000: MinIO S3 API
#   - 9001: MinIO Web Console (http://localhost:9001)
#   - 7077: Spark Master
#   - 8080: Spark Web UI
#
# CREDENTIALS:
#   - MinIO: minioadmin / minioadmin
#
# SAU KHI UP XONG, SUBMIT SPARK BRONZE JOBS:
#   bash scripts/submit_bronze_jobs.sh all
# ============================================================

services:

  # ────────────────────────────────────────────────────────────
  # ZOOKEEPER
  # ────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ────────────────────────────────────────────────────────────
  # KAFKA
  # ────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 24
      # Cần cho Kafka Connect distributed mode
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ────────────────────────────────────────────────────────────
  # MINIO
  # ────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ────────────────────────────────────────────────────────────
  # MINIO SETUP - Tạo buckets
  # ────────────────────────────────────────────────────────────
  minio-setup:
    image: minio/mc:latest
    container_name: minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/bronze &&
        mc mb --ignore-existing local/silver &&
        mc mb --ignore-existing local/gold &&
        mc anonymous set download local/bronze &&
        mc anonymous set download local/silver &&
        mc anonymous set download local/gold &&
        mc put /dev/null local/bronze/weather/.keep 2>/dev/null || true &&
        mc put /dev/null local/bronze/sorted_request_table/.keep 2>/dev/null || true &&
        mc put /dev/null local/bronze/sorted_response_table/.keep 2>/dev/null || true &&
        echo '[SETUP] ✅ Buckets + bronze folders created: weather, sorted_request_table, sorted_response_table'

  # ────────────────────────────────────────────────────────────
  # KAFKA SETUP - Tạo topics
  # ────────────────────────────────────────────────────────────
  kafka-setup:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-setup
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        /usr/bin/kafka-topics --bootstrap-server kafka:9092 \
          --create --if-not-exists \
          --topic nyc_weather \
          --partitions 1 \
          --replication-factor 1 &&

        /usr/bin/kafka-topics --bootstrap-server kafka:9092 \
          --create --if-not-exists \
          --topic nyc_taxi_events \
          --partitions 3 \
          --replication-factor 1 &&

        echo '[SETUP] ✅ Topics created: nyc_weather, nyc_taxi_events'

  # ────────────────────────────────────────────────────────────
  # SPARK - Bronze (Streaming) + Silver / Gold layer processing
  # Bronze layer: Spark Streaming đọc từ Kafka → MinIO
  # Sau khi stack up: bash scripts/submit_bronze_jobs.sh all
  # ────────────────────────────────────────────────────────────
  spark-master:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: spark-master
    hostname: spark-master
    user: root
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - ./:/opt/spark/app
    depends_on:
      - minio
    environment:
      SPARK_MODE: master
      SPARK_MASTER_HOST: spark-master
      HADOOP_USER_NAME: root
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 15s
      timeout: 10s
      retries: 5

  spark-worker:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: spark-worker
    user: root
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
    depends_on:
      spark-master:
        condition: service_healthy
    volumes:
      - ./:/opt/spark/app
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 6G
      SPARK_WORKER_CORES: 6
      HADOOP_USER_NAME: root

  # ────────────────────────────────────────────────────────────
  # PRODUCERS (legacy - dùng file tĩnh để test)
  # ────────────────────────────────────────────────────────────
  weather-producer:
    build: ./producer/weather
    container_name: weather-producer
    depends_on:
      kafka-setup:
        condition: service_completed_successfully
    volumes:
      - ./datasets:/datasets
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    restart: on-failure

  request-producer:
    build: ./producer/request
    container_name: request-producer
    depends_on:
      kafka-setup:
        condition: service_completed_successfully
    volumes:
      - ./datasets:/datasets
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    restart: on-failure

  response-producer:
    build: ./producer/response
    container_name: response-producer
    depends_on:
      kafka-setup:
        condition: service_completed_successfully
    volumes:
      - ./datasets:/datasets
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    restart: on-failure
# ────────────────────────────────────────────────────────────
volumes:
  minio_data:
