# spark-defaults.conf
# Các config này được load tự động khi Spark khởi động
# Một số có thể override bằng --conf khi spark-submit

spark.master                     spark://spark-master:7077
spark.app.name                   NYC-Taxi-Pipeline

# ── Delta Lake extensions ────────────────────────────────────
spark.sql.extensions             io.delta.sql.DeltaSparkSessionExtension
spark.sql.catalog.spark_catalog  org.apache.spark.sql.delta.catalog.DeltaCatalog

# ── S3A / MinIO ──────────────────────────────────────────────
# ⚠️ NOTE: minioadmin/minioadmin là default dev credentials
# Đổi lại nếu deploy production
spark.hadoop.fs.s3a.endpoint              http://minio:9000
spark.hadoop.fs.s3a.access.key            minioadmin
spark.hadoop.fs.s3a.secret.key            minioadmin
spark.hadoop.fs.s3a.path.style.access     true
spark.hadoop.fs.s3a.impl                  org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.connection.ssl.enabled false

# ── S3A performance tuning ────────────────────────────────────
spark.hadoop.fs.s3a.fast.upload           true
spark.hadoop.fs.s3a.fast.upload.buffer    bytebuffer
spark.hadoop.fs.s3a.multipart.size        32m
spark.hadoop.fs.s3a.connection.maximum    100
spark.hadoop.fs.s3a.threads.max           20

# ── Spark Streaming ───────────────────────────────────────────
spark.streaming.backpressure.enabled      true
spark.sql.streaming.checkpointFileManagerClass  org.apache.spark.sql.execution.streaming.CheckpointFileManager

# ── Shuffle ───────────────────────────────────────────────────
# Giảm từ default 200 xuống 8 vì data nhỏ (263 zones)
# 200 partitions cho 263 rows = lãng phí
spark.sql.shuffle.partitions              8