apiVersion: 1

providers:
  - name: BigData Dashboards
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true # cho phép edit trên UI rồi save lại JSON
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: true
